name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-targets:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - PlayGame
          - PaletteMaker
          - TileMaker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libsdl3-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_WARNINGS_AS_ERRORS=ON

      - name: Build target
        run: cmake --build build --target ${{ matrix.target }}

  shared-tests-and-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libsdl3-dev cppcheck

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DENABLE_WARNINGS_AS_ERRORS=ON

      - name: Build shared tests
        run: cmake --build build --target shared_components_tests

      - name: Test
        run: ctest --test-dir build --output-on-failure -L shared

      - name: Cppcheck
        run: bash ./tools/run_cppcheck.sh core

  strict-cppcheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: ${{ vars.CPPCHECK_STRICT_BLOCKING != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Cppcheck (strict profile)
        run: |
          set +e
          bash ./tools/run_cppcheck.sh strict --xml --xml-version=2 2> cppcheck-strict-report.xml
          echo "CPPCHECK_STRICT_EXIT_CODE=$?" >> "$GITHUB_ENV"
          exit 0

      - name: Summarize strict cppcheck report
        if: always()
        run: |
          python3 ./tools/summarize_cppcheck_xml.py \
            cppcheck-strict-report.xml \
            --strict-exit-code "${CPPCHECK_STRICT_EXIT_CODE:-0}" \
            --max-severity error=0 \
            --max-severity warning=0 \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce strict cppcheck gate
        if: vars.CPPCHECK_STRICT_BLOCKING == 'true'
        run: |
          python3 ./tools/summarize_cppcheck_xml.py \
            cppcheck-strict-report.xml \
            --max-severity error=0 \
            --max-severity warning=0 \
            --enforce

      - name: Upload strict cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-strict-report
          path: cppcheck-strict-report.xml

  sanitizer-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libsdl3-dev

      - name: Configure (Sanitizers)
        run: cmake -S . -B build-sanitized -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_SANITIZERS=ON -DENABLE_WARNINGS_AS_ERRORS=ON

      - name: Build (Sanitizers)
        run: cmake --build build-sanitized

      - name: Test (Sanitizers)
        run: ctest --test-dir build-sanitized --output-on-failure -L shared
