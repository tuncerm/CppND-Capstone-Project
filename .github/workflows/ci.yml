name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-targets:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - PlayGame
          - PaletteMaker
          - TileMaker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libsdl3-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build target
        run: cmake --build build --target ${{ matrix.target }}

  shared-tests-and-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libsdl3-dev cppcheck

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build shared tests
        run: cmake --build build --target shared_components_tests

      - name: Test
        run: ctest --test-dir build --output-on-failure -L shared

      - name: Cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            src shared palette-maker tile-maker

  strict-cppcheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Cppcheck (strict profile, non-blocking)
        run: |
          cppcheck \
            --enable=all \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            src shared palette-maker tile-maker

  sanitizer-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libsdl3-dev

      - name: Configure (Sanitizers)
        run: cmake -S . -B build-sanitized -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_SANITIZERS=ON

      - name: Build (Sanitizers)
        run: cmake --build build-sanitized

      - name: Test (Sanitizers)
        run: ctest --test-dir build-sanitized --output-on-failure -L shared
